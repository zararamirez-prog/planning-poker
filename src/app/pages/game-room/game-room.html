<app-game-layout>
  <app-header
    slot="header"
    [gameName]="gameName()"
    [userName]="currentPlayer()?.name ?? ''"
    (inviteClick)="onInviteClick()"
  />

  <app-voting-table slot="table" [players]="players()" [currentUserId]="currentUserId()" [gameStatus]="gameStatus()" />

  @if (showCardPool()) {
    <ng-container slot="pool">
      <app-card-pool
        [cards]="availableCards()"
        [selectedCardId]="selectedCardId()"
        [isDisabled]="currentUserHasVoted()"
        (cardSelected)="onCardSelected($event)"
      />
    </ng-container>
  }

  @if (showUserForm()) {
    <app-user-form slot="modal" title="Tu nombre" (userCreated)="onUserCreated($event)" />
  }

  @if (showInviteModal()) {
    <app-invite-modal slot="modal" [link]="inviteLink()" (closeModal)="onCloseInvite()" />
  }
</app-game-layout>
