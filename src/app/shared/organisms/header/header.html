<header class="header">
  <div class="header__brand">
    <img src="icons/logo.png" alt="Planning Poker logo" class="header__logo" />
    @if (gameName()) {
      <h1 class="header__title">{{ gameName() }}</h1>
    }
  </div>

  @if (userName()) {
    <div class="header__actions">
      <app-avatar [name]="userName()" size="md" />
      <app-button variant="secondary" size="sm" (click)="onInviteClick()">
        Invitar jugadores
      </app-button>
    </div>
  }
</header>
